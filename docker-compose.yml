services:
  kanban:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kanban
    ports:
      - "${KANBAN_PORT:-8040}:8040"
    volumes:
      - kanban-data:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8040/')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  kanban-data:
    driver: local
